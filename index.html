<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Causality | Login</title>
    
    <style>
        /* The UI / Background Styling */
        body, html { height: 100%; margin: 0; font-family: sans-serif; }
        
        .bg-image {
            /* Swap this URL with your historical background image */
            background-image: url('https://images.unsplash.com/photo-1505664194779-8beaceb93744?q=80&w=2070');
            background-size: cover; background-position: center;
            height: 100%; display: flex; justify-content: center; align-items: center;
        }

        .login-box {
            background: rgba(30, 30, 30, 0.85); /* Semi-transparent dark mode */
            padding: 40px; border-radius: 12px; width: 300px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px);
            color: white; text-align: center;
        }

        input {
            width: 90%; padding: 10px; margin: 10px 0;
            border: none; border-radius: 5px; background: #333; color: white;
        }

        button {
            width: 100%; padding: 10px; margin-top: 15px;
            border: none; border-radius: 5px; background: #007bff; color: white;
            cursor: pointer; font-weight: bold;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="bg-image">
    <div class="login-box">
        <h2>Causality</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="signUp()">Sign Up</button>
        <button onclick="login()" style="background: #28a745;">Login</button>
        <p id="status-msg" style="color: #ff4c4c; font-size: 14px;"></p>
    </div>
</div>




    <script>
    // 1. INITIALIZE SUPABASE (Only once!)
    const supabaseUrl = 'https://pwwdhiucvdlsjhdrwzrp.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3d2RoaXVjdmRsc2poZHJ3enJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDE3NjgsImV4cCI6MjA5MDYxNzc2OH0.6yisgTkldfUq4lFw0w_0Ccqvzm_orKiOUfNwQUdeI38';
    
    // Use a check to prevent double-initialization if the script runs twice
    let supabase;
    try {
        supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    } catch (e) {
        console.error("Supabase failed to initialize. Check your network/firewall.", e);
    }

    // 2. SIGN UP LOGIC
    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('status-msg');

        if (!email || !password) {
            msg.innerText = "Please fill in all fields.";
            msg.style.color = "#ff4c4c";
            return;
        }

        const { data, error } = await supabase.auth.signUp({ email, password });

        if (error) {
            msg.innerText = error.message;
            msg.style.color = "#ff4c4c";
        } else {
            msg.innerText = "Check your email to confirm your account!";
            msg.style.color = "#00ff00";
        }
    }

    // 3. LOGIN LOGIC
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('status-msg');

        if (!email || !password) {
            msg.innerText = "Email and password required.";
            msg.style.color = "#ff4c4c";
            return;
        }

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            msg.innerText = error.message;
            msg.style.color = "#ff4c4c";
        } else {
            msg.innerText = "Login successful! Redirecting...";
            msg.style.color = "#00ff00";
            
            setTimeout(() => {
                window.location.href = 'map.html'; 
            }, 1000);
        }
    }
</script>


    

</body>
</html>
